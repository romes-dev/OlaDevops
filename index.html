<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Olá Devops</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f0f0f0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            h1 {
                color: #333;
            }
            .btn-comprar {
                padding: 20px 48px;
                font-size: 24px;
                color: white;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                background-color: #4CAF50;
            }
            .btn-comprar:hover {
                background-color: #1cd625;
            }
        </style>
    </head>

    <body>
        <div>
            <h1>Olá Devops</h1>
            <button class="btn-comprar">Comprar</button>
        </div>
    </body>
</html>
